name: Publish Missing npm Versions

on:
  workflow_dispatch:
    inputs:
      build-first:
        description: 'Build all packages before publishing'
        required: false
        default: true
        type: boolean
      dry-run:
        description: 'Do everything except the actual npm publish'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish-missing:
    runs-on: ubuntu-latest
    # Requires manual approval — configure required reviewers under
    # Settings > Environments > npm-publish. Every workflow that runs `npm publish` uses this
    # same environment so there's exactly one place that grants "can publish to npm" access.
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          root-install: 'false'

      - name: Build all packages
        if: inputs.build-first != 'false'
        run: node common/scripts/install-run-rush.js build --verbose

      # See scripts/release/npm-publish.mjs for why there's no "configure npm registry" step
      # here — writing an .npmrc auth line breaks OIDC trusted publishing
      # (actions/setup-node#1440); the repo-root .npmrc's `registry=` line is all npm needs.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish versions missing on npm
        env:
          DRY_RUN: ${{ inputs.dry-run && '1' || '' }}
        run: node scripts/release/cli.mjs publish-missing
