name: Release Single Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Name of the Rush package to release
        required: true
        type: choice
        options:
          - '/block'
          - '/craft'
          - '@vielzeug/deposit'
          - '/grip'
          - '/relay'
          - '/courier'
          - '/orbit'
          - '/forge'
          - '/lingua'
          - '/rune'
          - '@vielzeug/permit'
          - '/route'
          - '/sourcerer'
          - '/ripple'
          - '/tempo'
          - '@vielzeug/toolkit'
          - '/sieve'
          - '/scroll'
          - '/wired'
          - '/worker'
      bump:
        description: 'Version bump (only used if no change files exist)'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-main-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          scope: '@vielzeug'
          always-auth: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rush cache
        uses: actions/cache@v4
        with:
          path: |
            common/temp/install-run
            common/temp/pnpm-store
            ~/.rush
          key: ${{ runner.os }}-rush-${{ hashFiles('rush.json', 'pnpm-lock.yaml', 'common/config/rush/pnpm-config.json') }}
          restore-keys: |
            ${{ runner.os }}-rush-

      - name: Setup build cache
        uses: actions/cache@v4
        with:
          path: |
            **/dist
            **/node_modules/.cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/package.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('**/package.json') }}-
            ${{ runner.os }}-build-

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rush Install
        run: node common/scripts/install-run-rush.js install

      - name: Build all packages
        run: node common/scripts/install-run-rush.js build --verbose

      - name: Get package info
        id: package-info
        run: |
          PACKAGE_FOLDER=$(node -e "const rush = require('./rush.json'); const project = rush.projects.find(p => p.packageName === '${{ inputs.package }}'); console.log(project.projectFolder);")
          OLD_VERSION=$(node -e "console.log(require('./${PACKAGE_FOLDER}/package.json').version)")

          # Check npm version
          NPM_VERSION=$(npm view ${{ inputs.package }} version 2>/dev/null || echo "0.0.0")

          echo "folder=$PACKAGE_FOLDER" >> $GITHUB_OUTPUT
          echo "old-version=$OLD_VERSION" >> $GITHUB_OUTPUT
          echo "npm-version=$NPM_VERSION" >> $GITHUB_OUTPUT

          echo "📦 Package: ${{ inputs.package }}"
          echo "📂 Folder: ${PACKAGE_FOLDER}"
          echo "📋 Local version: ${OLD_VERSION}"
          echo "📋 npm version: ${NPM_VERSION}"

          # Compare versions
          if [ "$OLD_VERSION" = "$NPM_VERSION" ]; then
            echo "⚠️  Local version matches npm version"
            echo "   A version bump will be required to release"
          elif [ "$NPM_VERSION" = "0.0.0" ]; then
            echo "✅ Package not yet published to npm"
          else
            echo "ℹ️  Local and npm versions differ"
          fi

      - name: Check for existing change files
        id: check-changes
        run: |
          PACKAGE_CHANGE_FILES=""

          while IFS= read -r file; do
            if jq -e --arg pkg "${{ inputs.package }}" '.changes[]? | select(.packageName == $pkg)' "$file" >/dev/null; then
              PACKAGE_CHANGE_FILES="${PACKAGE_CHANGE_FILES}${file}"
              PACKAGE_CHANGE_FILES+=$'\n'
            fi
          done < <(find common/changes -type f -name "*.json")

          if [ -n "$PACKAGE_CHANGE_FILES" ]; then
            CHANGE_COUNT=$(printf '%s' "$PACKAGE_CHANGE_FILES" | sed '/^$/d' | wc -l | tr -d ' ')
            echo "has-changes=true" >> $GITHUB_OUTPUT

            # Detect the highest bump type from existing change files
            # Priority: major > minor > patch
            DETECTED_BUMP="patch"

            while IFS= read -r file; do
              [ -z "$file" ] && continue

              # Extract type from each change file
              TYPE=$(node -e "
                try {
                  const data = require('${file}');
                  const changes = data.changes || [];
                  const types = changes.map(c => c.type).filter(Boolean);
                  console.log(types[0] || 'patch');
                } catch (e) {
                  console.log('patch');
                }
              ")

              # Update to highest priority bump type
              if [ "$TYPE" = "major" ]; then
                DETECTED_BUMP="major"
              elif [ "$TYPE" = "minor" ] && [ "$DETECTED_BUMP" != "major" ]; then
                DETECTED_BUMP="minor"
              fi
            done <<< "$PACKAGE_CHANGE_FILES"

            echo "bump-type=$DETECTED_BUMP" >> $GITHUB_OUTPUT
            echo "✅ Found ${CHANGE_COUNT} existing change file(s) for ${{ inputs.package }}"
            echo "📋 Detected bump type: $DETECTED_BUMP (from change files)"
            echo "ℹ️  Manual bump input '${{ inputs.bump }}' will be ignored"
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "bump-type=${{ inputs.bump }}" >> $GITHUB_OUTPUT
            echo "⚠️  No existing change files found for ${{ inputs.package }}"
            echo "📋 Using manual bump type: ${{ inputs.bump }}"
          fi

      - name: Create change file if none exists
        if: steps.check-changes.outputs.has-changes == 'false'
        run: |
          PACKAGE_SLUG=$(echo "${{ inputs.package }}" | cut -d'/' -f2)
          CHANGE_DIR="common/changes/auto-release-$(date +%Y-%m-%d)"
          mkdir -p "${CHANGE_DIR}"

          BUMP_TYPE="${{ steps.check-changes.outputs.bump-type }}"
          CURRENT_VERSION="${{ steps.package-info.outputs.old-version }}"

          # Calculate the next version based on bump type
          NEXT_VERSION=$(node -e "
            const current = '$CURRENT_VERSION';
            const bump = '$BUMP_TYPE';
            const parts = current.split('.').map(Number);

            if (bump === 'major') {
              parts[0]++;
              parts[1] = 0;
              parts[2] = 0;
            } else if (bump === 'minor') {
              parts[1]++;
              parts[2] = 0;
            } else {
              parts[2]++;
            }

            console.log(parts.join('.'));
          ")

          echo "📋 Current version: ${CURRENT_VERSION}"
          echo "📋 Bump type: ${BUMP_TYPE}"
          echo "📋 Next version: ${NEXT_VERSION}"

          # Create a rush change file for this release
          cat > "${CHANGE_DIR}/release_$(date +%Y-%m-%d-%H-%M-%S).json" << EOF
          {
            "changes": [
              {
                "packageName": "${{ inputs.package }}",
                "comment": "Release version ${NEXT_VERSION} (${BUMP_TYPE} bump from ${CURRENT_VERSION})",
                "type": "${BUMP_TYPE}"
              }
            ],
            "email": "github-actions[bot]@users.noreply.github.com"
          }
          EOF

          echo "✅ Created temporary change file for ${{ inputs.package }}"
          echo "   This will bump version from ${CURRENT_VERSION} to ${NEXT_VERSION}"

      - name: Verify only selected package will be released
        run: |
          echo "📋 Release Plan:"
          echo "  Package: ${{ inputs.package }}"
          PACKAGE_CHANGE_COUNT=0
          while IFS= read -r file; do
            if jq -e --arg pkg "${{ inputs.package }}" '.changes[]? | select(.packageName == $pkg)' "$file" >/dev/null; then
              PACKAGE_CHANGE_COUNT=$((PACKAGE_CHANGE_COUNT + 1))
            fi
          done < <(find common/changes -type f -name "*.json")

          echo "  Change files found: ${PACKAGE_CHANGE_COUNT}"

          # Check for other packages with changes
          OTHER_CHANGES=$(find common/changes -type f -name "*.json" -print0 \
            | xargs -0 -r -I{} jq -r '.changes[]?.packageName // empty' {} \
            | sort -u \
            | { grep -Fvx "${{ inputs.package }}" || true; } \
            | tr '\n' ' ')

          if [ -n "$OTHER_CHANGES" ]; then
            echo "⚠️  Note: Other packages have pending changes but will NOT be released:"
            echo "  ${OTHER_CHANGES}"
            echo "  Use 'Release All Packages' workflow to release multiple packages at once."
          else
            echo "✅ No other packages have pending changes."
          fi

      - name: Commit change files
        run: |
          # Add new or modified change files to git
          git add common/changes

          # Commit change files when staged changes exist
          if git diff --cached --quiet; then
            echo "ℹ️  No change-file updates to commit"
          else
            git commit -m "chore: add change files for ${{ inputs.package }}"
          fi

          # Push with rebase/retry in case remote main advanced during this run
          for attempt in 1 2 3; do
            echo "🔄 Sync + push attempt ${attempt}/3"
            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "✅ Pushed change files to main"
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "❌ Failed to push after 3 attempts. Remote main is changing too quickly."
              exit 1
            fi
          done

          echo "✅ Committed change files"

      - name: Apply version bump with Rush
        id: rush-publish
        run: |
          # Rush publish --apply will:
          # - Read change files for all packages
          # - Update package.json versions
          # - Generate/update CHANGELOG.md and CHANGELOG.json
          # - Delete processed change files
          # - Commit all changes
          echo "🚀 Running Rush publish --apply..."
          node common/scripts/install-run-rush.js publish --apply --target-branch main --add-commit-details

          echo "✅ Rush publish completed"

      - name: Get new version
        id: version
        run: |
          NEW_VERSION=$(node -e "console.log(require('./${{ steps.package-info.outputs.folder }}/package.json').version)")
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "✅ New version: $NEW_VERSION"

      - name: Validate version is new
        run: |
          NEW_VERSION="${{ steps.version.outputs.new-version }}"
          OLD_VERSION="${{ steps.package-info.outputs.old-version }}"
          NPM_VERSION="${{ steps.package-info.outputs.npm-version }}"

          echo "📊 Version Check:"
          echo "   Old version:     $OLD_VERSION"
          echo "   New version:     $NEW_VERSION"
          echo "   npm version:     $NPM_VERSION"

          # Check 1: Verify version was bumped
          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo ""
            echo "❌ Error: Version was not bumped by Rush!"
            echo ""
            echo "The version is still $NEW_VERSION"
            echo "This might mean:"
            echo "  1. Change file was not processed correctly"
            echo "  2. Rush didn't detect changes"
            echo "  3. Change file format was incorrect"
            echo ""
            exit 1
          fi

          # Check 2: Verify new version is higher than npm
          if [ "$NPM_VERSION" != "0.0.0" ]; then
            COMPARE_RESULT=$(node -e "
              function compareVersions(v1, v2) {
                const parts1 = v1.split('.').map(Number);
                const parts2 = v2.split('.').map(Number);

                for (let i = 0; i < 3; i++) {
                  if (parts1[i] > parts2[i]) return 1;
                  if (parts1[i] < parts2[i]) return -1;
                }
                return 0;
              }

              console.log(compareVersions('$NEW_VERSION', '$NPM_VERSION'));
            ")

            if [ "$COMPARE_RESULT" = "-1" ]; then
              echo ""
              echo "❌ Error: New version is LOWER than npm version!"
              echo "   New version: $NEW_VERSION"
              echo "   npm version: $NPM_VERSION"
              exit 1
            elif [ "$COMPARE_RESULT" = "0" ]; then
              echo ""
              echo "⚠️  Warning: Version $NEW_VERSION already exists on npm"
              echo "npm will reject publishing the same version."
            else
              echo ""
              echo "✅ Version validation passed!"
              echo "   Bump: $OLD_VERSION → $NEW_VERSION"
            fi
          else
            echo ""
            echo "✅ First publication of this package"
            echo "   Version: $NEW_VERSION"
          fi

      - name: Tag release
        run: |
          TAG_NAME="${{ inputs.package }}@${{ steps.version.outputs.new-version }}"

          # Check if tag already exists
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "⚠️  Tag $TAG_NAME already exists"
            echo "🔄 Deleting existing tag locally and remotely..."
            git tag -d "$TAG_NAME" || true
            git push origin ":refs/tags/$TAG_NAME" || true
            echo "✅ Old tag deleted"
          fi

          # Create new tag
          echo "🏷️  Creating tag $TAG_NAME"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "✅ Tag created and pushed"

      - name: Verify npm auth and @vielzeug access
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "❌ NPM_TOKEN is empty or missing. Configure repository secret NPM_TOKEN."
            exit 1
          fi

          echo "🔐 Verifying npm authentication..."
          NPM_USER=$(npm whoami 2>/dev/null || true)

          if [ -z "$NPM_USER" ]; then
            echo "❌ npm authentication failed for NPM_TOKEN (npm whoami returned nothing)."
            echo "   Use an npm Automation token from an account with publish rights to @vielzeug."
            exit 1
          fi

          echo "✅ Authenticated as npm user: $NPM_USER"

          if ! npm org ls vielzeug >/dev/null 2>&1; then
            echo "❌ Token is valid, but has no visible access to npm org @vielzeug."
            echo "   This causes npm publish to fail with E404 for @vielzeug/* packages."
            echo "   Ensure this npm user is in org @vielzeug with publish permissions and regenerate NPM_TOKEN."
            exit 1
          fi

          echo "✅ npm org access looks valid. Proceeding to publish."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        working-directory: ${{ steps.package-info.outputs.folder }}
        run: |
          # Pack the package to create a tarball
          # This ensures only files specified in "files" field are included
          echo "📦 Packing package..."
          TARBALL=$(npm pack --json | node -e "const data = JSON.parse(require('fs').readFileSync(0)); console.log(data[0].filename);")

          echo "📦 Tarball created: ${TARBALL}"

          # Verify tarball contents
          echo "📋 Tarball contents:"
          tar -tzf "${TARBALL}" | head -20

          # Publish the tarball
          echo "🚀 Publishing to npm..."
          set +e
          PUBLISH_OUTPUT=$(npm publish "${TARBALL}" --access public 2>&1)
          PUBLISH_EXIT=$?
          set -e

          echo "$PUBLISH_OUTPUT"

          if [ $PUBLISH_EXIT -ne 0 ]; then
            if echo "$PUBLISH_OUTPUT" | grep -q "E404"; then
              echo "❌ npm returned E404 while publishing ${{ inputs.package }}@${{ steps.version.outputs.new-version }}."
              echo "   This usually means NPM_TOKEN lacks publish rights for scope @vielzeug."
              echo "   Verify org membership/permissions and rotate NPM_TOKEN from an authorized npm account."
            fi

            exit $PUBLISH_EXIT
          fi

          # Clean up tarball
          rm -f "${TARBALL}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm publication
        run: |
          echo "Waiting 10 seconds for npm to update..."
          sleep 10

          NPM_VERSION=$(npm view ${{ inputs.package }} version 2>/dev/null || echo "not-found")
          EXPECTED_VERSION="${{ steps.version.outputs.new-version }}"

          if [ "$NPM_VERSION" = "$EXPECTED_VERSION" ]; then
            echo "✅ Successfully published ${{ inputs.package }}@$EXPECTED_VERSION to npm"
          else
            echo "⚠️  Warning: npm shows version $NPM_VERSION, expected $EXPECTED_VERSION"
            echo "This might be a propagation delay. Check https://www.npmjs.com/package/${{ inputs.package }}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.package }}@${{ steps.version.outputs.new-version }}"
          name: "${{ inputs.package }} v${{ steps.version.outputs.new-version }}"
          body: |
            ## ${{ inputs.package }} v${{ steps.version.outputs.new-version }}

            ### Installation

            ```bash
            npm install ${{ inputs.package }}@${{ steps.version.outputs.new-version }}
            ```

            ### Links

            - 📦 [npm package](https://www.npmjs.com/package/${{ inputs.package }}/v/${{ steps.version.outputs.new-version }})
            - 📋 [CHANGELOG](${{ github.server_url }}/${{ github.repository }}/blob/${{ inputs.package }}@${{ steps.version.outputs.new-version }}/${{ steps.package-info.outputs.folder }}/CHANGELOG.md)
          draft: false
          prerelease: false
          generate_release_notes: true
