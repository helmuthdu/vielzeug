name: Release Single Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g. @vielzeug/coins). Must have a pending change file — run rush change locally first.'
        required: true
        type: string

concurrency:
  group: release-main-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate package name
        run: |
          VALID=$(node -e "
            const r = require('./rush.json');
            process.stdout.write(r.projects.map(p => p.packageName).join('\n'));
          ")
          if ! echo "$VALID" | grep -Fxq "${{ inputs.package }}"; then
            echo "❌ Unknown package: ${{ inputs.package }}"
            echo ""
            echo "Valid packages:"
            echo "$VALID"
            exit 1
          fi
          echo "✅ Package validated: ${{ inputs.package }}"

      - name: Require change files
        run: |
          PKG="${{ inputs.package }}"
          COUNT=$(find common/changes -name "*.json" -exec \
            jq -r --arg p "$PKG" '.changes[]? | select(.packageName == $p) | .packageName' {} \; \
            | wc -l | tr -d ' ')

          if [ "$COUNT" = "0" ]; then
            echo "❌ No change file found for ${PKG}."
            echo ""
            echo "Run 'rush change' locally, commit the generated file, and re-trigger this workflow."
            exit 1
          fi

          echo "✅ Found ${COUNT} change entry(ies) for ${PKG}"

      - name: Get package folder and current version
        id: pkg
        run: |
          FOLDER=$(node -e "
            const r = require('./rush.json');
            const p = r.projects.find(p => p.packageName === '${{ inputs.package }}');
            process.stdout.write(p.projectFolder);
          ")
          OLD_VERSION=$(node -e "process.stdout.write(require('./${FOLDER}/package.json').version)")
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT
          echo "old-version=${OLD_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 ${{ inputs.package }} @ ${OLD_VERSION} in ${FOLDER}"

      - name: Verify npm auth
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_AUTH_TOKEN" ]; then
            echo "❌ npm token is missing for this job."
            echo "Expected NPM_TOKEN to exist"
            echo "If the token is stored as an Environment secret, bind this job to that environment or copy it to repository secrets."
            exit 1
          fi

          # Ensure npm can resolve auth in this step before checking identity.
          printf 'registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken=%s\n' "$NPM_AUTH_TOKEN" > "$HOME/.npmrc"

          echo "--- .npmrc contents (token masked) ---"
          sed 's/_authToken=.*/\_authToken=***/' "$HOME/.npmrc"
          echo "--- npm whoami output ---"
          NPM_WHOAMI_OUT=$(npm whoami --registry=https://registry.npmjs.org 2>&1) || true
          echo "$NPM_WHOAMI_OUT"
          NPM_USER=$(echo "$NPM_WHOAMI_OUT" | head -1 | tr -d '[:space:]')
          if [ -z "$NPM_USER" ] || echo "$NPM_USER" | grep -qi "error\|ENEEDAUTH\|401\|403"; then
            echo "❌ npm authentication failed. Use an Automation token with publish rights to @vielzeug."
            exit 1
          fi
          echo "✅ Authenticated as: ${NPM_USER}"

      - name: Build all packages
        run: node common/scripts/install-run-rush.js build --verbose

      - name: Apply version bump
        run: |
          node common/scripts/install-run-rush.js publish \
            --apply --target-branch main --add-commit-details
          echo "✅ Rush publish --apply complete"

      - name: Read new version
        id: version
        run: |
          NEW=$(node -e "process.stdout.write(require('./${{ steps.pkg.outputs.folder }}/package.json').version)")
          if [ "$NEW" = "${{ steps.pkg.outputs.old-version }}" ]; then
            echo "❌ Version was not bumped (still $NEW). Change file may not have matched."
            exit 1
          fi
          echo "new-version=${NEW}" >> $GITHUB_OUTPUT
          echo "✅ Version: ${{ steps.pkg.outputs.old-version }} → ${NEW}"

      - name: Push version bump commit
        run: |
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "✅ Pushed version bump to main"
              break
            fi
            [ "$attempt" -eq 3 ] && { echo "❌ Push failed after 3 attempts"; exit 1; }
            echo "� Retry ${attempt}/3..."
          done

      - name: Publish, tag and release
        uses: ./.github/actions/publish-package
        with:
          package: ${{ inputs.package }}
          version: ${{ steps.version.outputs.new-version }}
          folder: ${{ steps.pkg.outputs.folder }}
          npm-token: ${{ secrets.NPM_TOKEN }}
