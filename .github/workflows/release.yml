name: Release Single Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g. @vielzeug/coins). Must have a pending change file — run rush change locally first.'
        required: true
        type: string
      dry-run:
        description: 'Do everything except the actual npm publish / git tag / GitHub release'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      folder: ${{ steps.project.outputs.folder }}
      version: ${{ steps.project.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Node-only setup so a typo'd package name or a missing change file fails in seconds
      # instead of after paying for the full rush/pnpm install below.
      - uses: ./.github/actions/setup
        with:
          root-install: 'false'
          rush-install: 'false'

      - name: Validate package name and require a pending change file
        run: |
          node scripts/release/cli.mjs project "${{ inputs.package }}" > /dev/null
          if ! node scripts/release/cli.mjs changed-packages | tr ' ' '\n' | grep -Fxq "${{ inputs.package }}"; then
            echo "❌ No pending change file found for ${{ inputs.package }}."
            echo "Run 'rush change' locally, commit the generated file, and re-trigger this workflow."
            exit 1
          fi

      - uses: ./.github/actions/setup

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build all packages
        run: node common/scripts/install-run-rush.js build --verbose

      # "rush publish --apply" has no per-package filter — it always consumes every pending
      # change file. This isolates the target package's change file(s), applies, and restores
      # the rest. See scripts/release/rush-publish-apply.mjs for why.
      - name: Apply version bump
        run: node scripts/release/cli.mjs apply "${{ inputs.package }}"

      - id: project
        run: node scripts/release/cli.mjs project "${{ inputs.package }}" >> "$GITHUB_OUTPUT"

      - name: Push version bump commit
        if: ${{ !inputs.dry-run }}
        run: |
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "✅ Pushed version bump to main"
              break
            fi
            [ "$attempt" -eq 3 ] && { echo "❌ Push failed after 3 attempts"; exit 1; }
            echo "🔄 Retry ${attempt}/3..."
          done

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: built-packages
          path: packages/
          retention-days: 1

  publish:
    needs: prepare
    uses: ./.github/workflows/_publish-one.yml
    permissions:
      contents: write
      id-token: write
    with:
      dry-run: ${{ inputs.dry-run }}
      folder: ${{ needs.prepare.outputs.folder }}
      package: ${{ inputs.package }}
      version: ${{ needs.prepare.outputs.version }}
