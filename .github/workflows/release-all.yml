name: Release All Packages

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release-all" to confirm releasing all packages with pending changes'
        required: true
        type: string

concurrency:
  group: release-main-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "release-all" ]; then
            echo "❌ You must type 'release-all' to confirm."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Require pending change files
        id: changes
        run: |
          PACKAGES=$(find common/changes -name "*.json" -exec \
            jq -r '.changes[]?.packageName // empty' {} \; \
            | sort -u | tr '\n' ' ')

          if [ -z "$PACKAGES" ]; then
            echo "❌ No pending change files found. Run 'rush change' for each package, commit, then re-trigger."
            exit 1
          fi

          echo "packages=${PACKAGES}" >> $GITHUB_OUTPUT
          echo "📦 Packages with pending changes: ${PACKAGES}"

      - name: Verify npm auth
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM_AUTH_TOKEN || secrets.NODE_AUTH_TOKEN }}
        run: |
          if [ -z "$NPM_AUTH_TOKEN" ]; then
            echo "❌ npm token is missing for this job."
            echo "Expected one of: NPM_TOKEN, NPM_AUTH_TOKEN, NODE_AUTH_TOKEN."
            echo "If the token is stored as an Environment secret, bind this job to that environment or copy it to repository secrets."
            exit 1
          fi

          # Ensure npm can resolve auth in this step before checking identity.
          cat > "$HOME/.npmrc" << EOF
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${NPM_AUTH_TOKEN}
          EOF

          NPM_USER=$(npm whoami --registry=https://registry.npmjs.org 2>/dev/null || true)
          if [ -z "$NPM_USER" ]; then
            echo "❌ npm authentication failed. Use an Automation token with publish rights to @vielzeug."
            exit 1
          fi
          echo "✅ Authenticated as: ${NPM_USER}"

      - name: Record versions before bump
        run: |
          for pkg in ${{ steps.changes.outputs.packages }}; do
            FOLDER=$(node -e "const r=require('./rush.json'); process.stdout.write(r.projects.find(p=>p.packageName==='${pkg}').projectFolder)")
            VERSION=$(node -e "process.stdout.write(require('./${FOLDER}/package.json').version)")
            echo "${pkg}=${VERSION}"
          done > /tmp/versions-before.txt
          cat /tmp/versions-before.txt

      - name: Build all packages
        run: node common/scripts/install-run-rush.js build --verbose

      - name: Apply version bumps
        run: |
          node common/scripts/install-run-rush.js publish \
            --apply --target-branch main --add-commit-details
          echo "✅ Rush publish --apply complete"

      - name: Push version bump commit
        run: |
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "✅ Pushed version bumps to main"
              break
            fi
            [ "$attempt" -eq 3 ] && { echo "❌ Push failed after 3 attempts"; exit 1; }
            echo "🔄 Retry ${attempt}/3..."
          done

      - name: Configure npm auth
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@vielzeug'

      - name: Publish each package
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM_AUTH_TOKEN || secrets.NODE_AUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASED=""

          for pkg in ${{ steps.changes.outputs.packages }}; do
            FOLDER=$(node -e "const r=require('./rush.json'); process.stdout.write(r.projects.find(p=>p.packageName==='${pkg}').projectFolder)")
            OLD=$(grep "^${pkg}=" /tmp/versions-before.txt | cut -d'=' -f2)
            NEW=$(node -e "process.stdout.write(require('./${FOLDER}/package.json').version)")

            echo ""
            echo "📦 ${pkg}: ${OLD} → ${NEW}"

            if [ "$OLD" = "$NEW" ]; then
              echo "   ℹ️  Version unchanged — skipping"
              continue
            fi

            # Skip if already on npm
            EXISTING=$(npm view "${pkg}@${NEW}" version 2>/dev/null || echo "")
            if [ "$EXISTING" = "$NEW" ]; then
              echo "   ⚠️  ${NEW} already on npm — skipping publish"
              RELEASED="${RELEASED}${pkg}@${NEW} "
              continue
            fi

            # Pack
            TARBALL=$(cd "$FOLDER" && npm pack --json | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0))[0].filename)")
            echo "   📦 Tarball: ${TARBALL}"

            # Publish
            set +e
            OUT=$(cd "$FOLDER" && npm publish "${TARBALL}" --access public 2>&1)
            EXIT=$?
            set -e
            echo "$OUT"
            cd "$FOLDER" && rm -f "${TARBALL}" && cd - > /dev/null

            if [ $EXIT -ne 0 ]; then
              echo "   ❌ publish failed (exit ${EXIT})"
              exit $EXIT
            fi

            # Tag
            git tag -f "${pkg}@${NEW}"

            RELEASED="${RELEASED}${pkg}@${NEW} "

            # Brief pause to avoid E409 registry conflicts on rapid multi-package publishes
            echo "   ⏳ 15s pause before next package..."
            sleep 15

            # GitHub release
            TAG="${pkg}@${NEW}"
            cat > /tmp/notes.md << NOTES
          ## ${pkg} v${NEW}

          ### Installation

              npm install ${pkg}@${NEW}

          ### Links

          - npm: https://www.npmjs.com/package/${pkg}/v/${NEW}
          - CHANGELOG: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${TAG}/${FOLDER}/CHANGELOG.md
          NOTES
            gh release create "${TAG}" --title "${pkg} v${NEW}" --generate-notes --notes-file /tmp/notes.md || true
          done

          # Push all tags at once
          git push origin --tags

          # Step summary
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          if [ -z "$RELEASED" ]; then
            echo "⚠️ No packages were published." >> $GITHUB_STEP_SUMMARY
          else
            for pv in $RELEASED; do
              echo "- ✅ **${pv}**" >> $GITHUB_STEP_SUMMARY
            done
          fi
