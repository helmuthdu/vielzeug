name: Release All Packages

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Do everything except the actual npm publish / git tag / GitHub release'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      has-releases: ${{ steps.plan.outputs.has-releases }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Node-only setup so "nothing pending" fails in seconds instead of after the full
      # rush/pnpm install below.
      - uses: ./.github/actions/setup
        with:
          root-install: 'false'
          rush-install: 'false'

      - id: changes
        run: echo "packages=$(node scripts/release/cli.mjs changed-packages)" >> "$GITHUB_OUTPUT"

      - name: Record versions before bump
        run: node scripts/release/cli.mjs versions ${{ steps.changes.outputs.packages }} > /tmp/versions-before.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: ./.github/actions/setup

      - name: Build all packages
        run: node common/scripts/install-run-rush.js build --verbose

      - name: Apply version bumps
        run: node scripts/release/cli.mjs apply

      - name: Push version bump commit
        if: ${{ !inputs.dry-run }}
        run: |
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "✅ Pushed version bumps to main"
              break
            fi
            [ "$attempt" -eq 3 ] && { echo "❌ Push failed after 3 attempts"; exit 1; }
            echo "🔄 Retry ${attempt}/3..."
          done

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: built-packages
          path: packages/
          retention-days: 1

      # Filters out anything already on npm or left unbumped by rush *before* the matrix is
      # built, so the Actions UI only ever shows real publish jobs — no phantom "skipped"
      # entries for a run where only 2 of 30 packages actually changed.
      - id: plan
        run: |
          PLAN=$(node scripts/release/cli.mjs plan --before-file /tmp/versions-before.txt ${{ steps.changes.outputs.packages }})
          echo "matrix={\"include\":${PLAN}}" >> "$GITHUB_OUTPUT"
          [ "$PLAN" = "[]" ] && echo "has-releases=false" >> "$GITHUB_OUTPUT" || echo "has-releases=true" >> "$GITHUB_OUTPUT"

  # One matrix entry per package that actually needs publishing — each gets its own job (own
  # log, own pass/fail) instead of one long bash loop. `fail-fast: false` because one package's
  # publish failing is not a reason to abort the others; E409 registry conflicts between
  # different packages' matrix jobs are handled by the retry/backoff in
  # scripts/release/npm-publish.mjs, not by serializing the matrix.
  publish:
    needs: prepare
    if: needs.prepare.outputs.has-releases == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/_publish-one.yml
    permissions:
      contents: write
      id-token: write
    with:
      dry-run: ${{ inputs.dry-run }}
      folder: ${{ matrix.folder }}
      package: ${{ matrix.package }}
      version: ${{ matrix.version }}
