name: Test and Lint (reusable)

on:
  workflow_call:
    inputs:
      coverage:
        description: Collect and upload coverage report
        type: boolean
        default: false

jobs:
  # ── Unit tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Rush build
        run: node common/scripts/install-run-rush.js build --verbose

      - name: Install root workspace tools (vitest, eslint — not managed by Rush)
        run: pnpm install --frozen-lockfile

      - name: Generate codex bundled data
        run: pnpm --dir packages/codex run prepare:data

      - name: Run unit tests
        run: pnpm test --run ${{ inputs.coverage && '--coverage' || '' }}

      - name: Upload coverage report
        if: inputs.coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          rush-install: 'false'

      - name: Install root workspace tools (vitest, eslint — not managed by Rush)
        run: pnpm install --frozen-lockfile

      - name: Lint JS/TS
        run: pnpm lint:js

      - name: Lint CSS
        run: pnpm lint:css
