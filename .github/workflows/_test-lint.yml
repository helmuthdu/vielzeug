name: Test and Lint (reusable)

on:
  workflow_call:
    inputs:
      coverage:
        description: Collect and upload coverage report
        type: boolean
        default: false

jobs:
  # ── Unit tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup

      - name: Rush build
        run: node common/scripts/install-run-rush.js build --verbose

      - name: Generate codex bundled data
        run: pnpm --dir packages/codex run prepare:data

      - name: Run unit tests
        run: pnpm test --run ${{ inputs.coverage && '--coverage' || '' }}

      - name: Upload coverage report
        if: inputs.coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup
        with:
          rush-install: 'false'

      - name: Lint JS/TS
        run: pnpm lint:js

      - name: Lint CSS
        run: pnpm lint:css

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error

      - name: Check AI metadata is in sync with source
        run: pnpm check:ai-data
