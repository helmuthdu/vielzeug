name: Publish one package (reusable)

# The single canonical "publish + tag + release" path — every place that ships a package to
# npm (publish.yml's mode=single as a single `needs:` job, mode=all as a matrix over many)
# calls this instead of re-implementing pack/publish/tag/release inline. A composite action
# can't be used from a bash loop or a matrix, so previously this logic drifted into three
# separate implementations; a reusable workflow can be both a single job and a matrix, which is
# what makes one real implementation possible here.
#
# npm's Trusted Publishing (OIDC) validates the *triggering* workflow's filename, not this
# reusable one — see publish.yml's header comment for why every publish path lives behind that
# one entry-point file. Don't register this filename as the Trusted Publisher on npmjs.com.
#
# Runs on a fresh runner, so it downloads the `built-packages` artifact the caller's prepare
# job uploaded rather than assuming dist/ already exists on disk.

on:
  workflow_call:
    inputs:
      dry-run:
        default: false
        required: false
        type: boolean
      folder:
        required: true
        type: string
      package:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    # Requires manual approval — configure required reviewers under
    # Settings > Environments > npm-publish. This is the one job that actually runs `npm
    # publish`, so it's the one place "can publish to npm" access needs to be granted.
    environment: npm-publish
    permissions:
      contents: write
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup
        with:
          root-install: 'false'
          rush-install: 'false'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: built-packages
          path: packages/

      # See scripts/release/npm-publish.mjs for why there's no "configure npm registry" step
      # here — writing an .npmrc auth line breaks OIDC trusted publishing
      # (actions/setup-node#1440); the repo-root .npmrc's `registry=` line is all npm needs.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish, tag and release
        env:
          DRY_RUN: ${{ inputs.dry-run && '1' || '' }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release/cli.mjs publish "${{ inputs.package }}" "${{ inputs.version }}" "${{ inputs.folder }}"
