name: Setup monorepo
description: Install Node, pnpm, Rush, root workspace tools and restore caches. Single source of truth for toolchain versions.

inputs:
  rush-install:
    description: Run rush install after cache restore (installs each package's workspace deps)
    default: 'true'
  root-install:
    description: Run pnpm install for root-level tools (vitest, eslint) — not managed by Rush
    default: 'true'

runs:
  using: composite
  steps:
    # node-version-file keeps this the one place the Node version is declared — every other
    # workflow step that needs Node/npm relies on what this step installed instead of pinning
    # its own `node-version`, which previously drifted out of sync in three separate files.
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version-file: '.nvmrc'

    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      with:
        version: '10.33.4'

    - name: Get pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

    - name: Cache pnpm store
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-

    - name: Cache Rush
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          common/temp/install-run
          common/temp/pnpm-store
          ~/.rush
        key: ${{ runner.os }}-rush-${{ hashFiles('rush.json', 'pnpm-lock.yaml', 'common/config/rush/pnpm-config.json') }}
        restore-keys: ${{ runner.os }}-rush-

    - name: Rush Install
      if: inputs.rush-install == 'true'
      shell: bash
      run: node common/scripts/install-run-rush.js install

    # Root package.json owns vitest/eslint/etc — Rush only manages packages/*, so every
    # caller needs this too. Folding it in here (instead of repeating it in every workflow)
    # is what makes `uses: ./.github/actions/setup` actually produce a working toolchain.
    - name: Install root workspace tools
      if: inputs.root-install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
