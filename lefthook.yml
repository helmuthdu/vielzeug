pre-commit:
  parallel: true
  commands:
    lint:assets:
      glob: '*.{html,json,yml}'
      stage_fixed: true
      run: npx prettier --write {staged_files}
    lint:styles:
      glob: '*.{css,scss}'
      stage_fixed: true
      run: >
        npx prettier --write {staged_files} &&
        npx stylelint --fix {staged_files}
    lint:scripts:
      glob: '**/*.{ts,tsx,js,jsx}'
      exclude: '\.(spec|test)\.(ts|tsx|js|jsx)$'
      stage_fixed: true
      run: >
        npx eslint --fix {staged_files} &&
        npx vitest related {staged_files} --passWithNoTests --run
    test:unit:
      glob: '**/*.{spec,test}.{ts,tsx,js,jsx}'
      stage_fixed: true
      run: >
        npx eslint --fix {staged_files} &&
        npx vitest {staged_files} --run
